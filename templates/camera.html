<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Camera Permission</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .icon {
      font-size: 56px;
      margin-bottom: 20px;
    }
    h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #ffffff;
    }
    p {
      font-size: 14px;
      color: #9090b0;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #6c63ff;
      color: #fff;
      margin-bottom: 12px;
    }
    .btn-primary:hover { background: #574fd6; }
    .btn-secondary {
      background: transparent;
      color: #6c63ff;
      border: 1px solid #6c63ff;
    }
    .btn-secondary:hover { background: #6c63ff22; }
    #status {
      margin-top: 18px;
      font-size: 13px;
      min-height: 20px;
    }
    .success { color: #4caf50; }
    .error   { color: #f44336; }
    video {
      margin-top: 18px;
      width: 100%;
      border-radius: 10px;
      display: none;
      border: 1px solid #2a2a4a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📷</div>
    <h2>Camera Access</h2>
    <p>This page wants to use your camera. Please allow access to continue.</p>
    <button class="btn-primary" onclick="requestCamera()">Allow Camera</button>
    <button class="btn-secondary" onclick="denyCamera()">Deny</button>
    <div id="status"></div>
    <video id="preview" autoplay playsinline></video>
  </div>

  <script>
    async function requestCamera() {
      const status = document.getElementById('status');
      const video = document.getElementById('preview');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.style.display = 'block';
        status.textContent = '✅ Camera access granted!';
        status.className = 'success';
      } catch (err) {
        status.textContent = '❌ Camera access denied: ' + err.message;
        status.className = 'error';
      }
    }

    function denyCamera() {
      const status = document.getElementById('status');
      status.textContent = '🚫 Camera access denied by user.';
      status.className = 'error';
    }
  </script>
</body>
</html>
