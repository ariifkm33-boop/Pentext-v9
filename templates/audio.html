<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audio Permission</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a0d0d;
      color: #f0d8d8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #2a1515;
      border: 1px solid #4a2020;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #ffffff; }
    p { font-size: 14px; color: #b07a7a; line-height: 1.6; margin-bottom: 28px; }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #c0392b; color: #fff; margin-bottom: 12px; }
    .btn-primary:hover { background: #a93226; }
    .btn-secondary { background: transparent; color: #c0392b; border: 1px solid #c0392b; }
    .btn-secondary:hover { background: #c0392b22; }
    #status { margin-top: 18px; font-size: 13px; min-height: 20px; }
    .success { color: #4caf50; }
    .error   { color: #f44336; }

    /* Waveform visualizer */
    #visualizer {
      margin-top: 18px;
      display: none;
    }
    canvas {
      width: 100%;
      height: 60px;
      border-radius: 8px;
      background: #1a0d0d;
      border: 1px solid #4a2020;
    }
    #vol-label {
      font-size: 12px;
      color: #b07a7a;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎙️</div>
    <h2>Microphone Access</h2>
    <p>This page wants to use your microphone. Allow access to enable audio features.</p>
    <button class="btn-primary" onclick="requestAudio()">Allow Microphone</button>
    <button class="btn-secondary" onclick="denyAudio()">Deny</button>
    <div id="status"></div>
    <div id="visualizer">
      <canvas id="wave"></canvas>
      <div id="vol-label">🔊 Listening...</div>
    </div>
  </div>

  <script>
    let animFrame;

    async function requestAudio() {
      const status = document.getElementById('status');
      const visualizer = document.getElementById('visualizer');
      const canvas = document.getElementById('wave');
      const ctx = canvas.getContext('2d');

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        status.textContent = '✅ Microphone access granted!';
        status.className = 'success';
        visualizer.style.display = 'block';

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256;

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function draw() {
          animFrame = requestAnimationFrame(draw);
          analyser.getByteTimeDomainData(dataArray);
          canvas.width = canvas.offsetWidth;
          canvas.height = 60;
          ctx.fillStyle = '#1a0d0d';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.lineWidth = 2;
          ctx.strokeStyle = '#e74c3c';
          ctx.beginPath();
          const sliceWidth = canvas.width / bufferLength;
          let x = 0;
          for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0;
            const y = (v * canvas.height) / 2;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            x += sliceWidth;
          }
          ctx.lineTo(canvas.width, canvas.height / 2);
          ctx.stroke();
        }
        draw();

      } catch (err) {
        status.textContent = '❌ Microphone denied: ' + err.message;
        status.className = 'error';
      }
    }

    function denyAudio() {
      const status = document.getElementById('status');
      status.textContent = '🚫 Microphone access denied by user.';
      status.className = 'error';
    }
  </script>
</body>
</html>
